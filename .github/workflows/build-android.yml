name: Build Android APK

on:
  workflow_dispatch:
    branches: [master]

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Login to Azure
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get backend URL from Terraform state
        id: tf-outputs
        run: |
          cd infra/terraform
          terraform init -input=false
          BACKEND_FQDN=$(terraform output -raw backend_url)
          echo "backend_url=https://${BACKEND_FQDN}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ steps.tf-outputs.outputs.backend_url }}

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ steps.tf-outputs.outputs.backend_url }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: proximity-alarm-${{ github.sha }}
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
