name: CI — Frontend

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for unused dependencies
        run: npx depcheck --ignores="@types/*,expo-status-bar,react-dom,react-native-web,react-native-gesture-handler,react-native-reanimated,react-native-safe-area-context,react-native-screens" || true

  build:
    name: Build (Web)
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web

  push-to-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    defaults:
      run:
        working-directory: .
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Get backend URL from Terraform state
        id: tf-outputs
        run: |
          cd infra/terraform
          terraform init -input=false
          BACKEND_FQDN=$(terraform output -raw backend_url)
          echo "backend_url=https://${BACKEND_FQDN}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg EXPO_PUBLIC_API_BASE_URL=${{ steps.tf-outputs.outputs.backend_url }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/proximity-alarm-frontend:latest \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/proximity-alarm-frontend:${{ github.sha }} \
            ./frontend

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_NAME }}.azurecr.io/proximity-alarm-frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image to ACR
        run: docker push ${{ secrets.ACR_NAME }}.azurecr.io/proximity-alarm-frontend --all-tags

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name ca-frontend-proximity-alarm-dev \
            --resource-group rg-proximity-alarm-dev \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/proximity-alarm-frontend:${{ github.sha }}

      - name: Purge old frontend images (keep last 2)
        run: |
          az acr run \
            --cmd "acr purge --filter 'proximity-alarm-frontend:.*' --ago 0d --keep 2 --untagged" \
            --registry ${{ secrets.ACR_NAME }} \
            /dev/null
