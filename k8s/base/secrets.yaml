# =============================================================================
# SECRETS
# =============================================================================
# A Secret stores sensitive data (passwords, tokens, keys) in Kubernetes.
# Values MUST be base64-encoded (not encrypted! just encoded).
#
# HOW TO ENCODE: echo -n "myvalue" | base64
# HOW TO DECODE: echo "bXl2YWx1ZQ==" | base64 -d
#
# WHY NOT plain text? Secrets are stored separately from pod specs. In production,
# you'd use tools like Sealed Secrets or Vault. For learning, this is fine.
#
# IMPORTANT: In a real project, NEVER commit secrets to git! Use .gitignore or
# a secrets manager. We include them here only for learning purposes.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: proximity-alarm       # Must match our namespace
type: Opaque                       # Opaque = arbitrary key-value pairs
data:
  # These are base64-encoded versions of the values from docker-compose.yml:
  #   echo -n "devops_user" | base64       -> ZGV2b3BzX3VzZXI=
  #   echo -n "devops_password" | base64   -> ZGV2b3BzX3Bhc3N3b3Jk
  #   echo -n "proximity_alarm" | base64   -> cHJveGltaXR5X2FsYXJt
  POSTGRES_USER: ZGV2b3BzX3VzZXI=
  POSTGRES_PASSWORD: ZGV2b3BzX3Bhc3N3b3Jk
  POSTGRES_DB: cHJveGltaXR5X2FsYXJt
