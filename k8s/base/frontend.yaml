# =============================================================================
# FRONTEND (Expo Web) — Deployment and Service
# =============================================================================
#
# In docker-compose you had:
#   frontend:
#     build: ./frontend
#     ports: ["8081:8081"]
#     environment: {EXPO_PUBLIC_API_BASE_URL: http://localhost:8000}
#
# In Kubernetes, the frontend needs to know the backend's external URL.
# Since we're using minikube, the backend will be at $(minikube ip):30080.
# We use an environment variable so this can be changed per environment.
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Deployment
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: proximity-alarm
  labels:
    app: proximity-alarm
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      component: frontend
  template:
    metadata:
      labels:
        app: proximity-alarm
        component: frontend
    spec:
      containers:
        - name: frontend
          image: proximity-alarm-frontend:static-v1
          imagePullPolicy: Never                  # Use locally-built image
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---

# -----------------------------------------------------------------------------
# 2. Service
# -----------------------------------------------------------------------------
# NodePort so we can access the frontend from our browser.
# We'll access it at http://$(minikube ip):30081
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: proximity-alarm
  labels:
    app: proximity-alarm
    component: frontend
spec:
  type: NodePort
  selector:
    component: frontend
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081                # External port for the frontend
      protocol: TCP
      name: http
